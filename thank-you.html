<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Thank You | Kochi Taxi Booking</title>
  <meta name="description" content="Thank you for contacting Kochi Taxi Service. We will get back to you shortly." />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#142850" />
  <link rel="icon" href="favicon.png" type="image/x-icon" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --dark: #142850;
      --dark-2: #1c3a6e;
      --gold: #cca300;
      --gold-dark: #b38f00;
      --bg: #f6f5f2;
      --card: #ffffff;
      --text: #2b2a28;
      --muted: #6e6b66;
      --border: #e7e3dc;
      --radius: 14px;
      --shadow: 0 8px 24px rgba(31, 29, 27, 0.08);
    }
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 100%);
      margin: 0;
      padding: 1.5em;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }
    .card {
      background: var(--card);
      max-width: 480px;
      width: 100%;
      margin: auto;
      padding: 2.6em 2.2em;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .check-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--gold);
      color: #fff;
      font-size: 1.6em;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1em;
    }
    h1 {
      color: var(--dark);
      font-size: 1.7em;
      margin: 0 0 0.6em;
    }
    p {
      font-size: 1.02em;
      line-height: 1.6;
      margin: 0 0 0.9em;
      color: var(--muted);
    }
    .btn {
      display: inline-block;
      margin-top: 1em;
      padding: 0.9em 2em;
      background-color: var(--gold);
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.98em;
      transition: background 0.15s ease;
    }
    .btn:hover {
      background-color: var(--gold-dark);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="check-icon">&#10003;</div>
    <h1>Thank You!</h1>
    <p>Your taxi booking request has been sent successfully.</p>
    <p>Our team will contact you shortly via call or WhatsApp.</p>
    <p><strong>Need urgent assistance?</strong><br />Call or WhatsApp us anytime.</p>

    <a class="btn" href="index.html">Back to Home</a>
  </div>
</body>
</html>
